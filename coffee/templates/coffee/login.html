{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cafetería Rojas</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
</head>

<body>

<div class="container">

    <div class="left">
        <div class="logo-text">THE ROJAS<br><span class="sub">COFFEE</span></div>
    </div>

    <div class="right">
        <div class="panel">

            <form">
                <h1>Welcome to the Rojas<br>Management System</h1>

                <p>Select your role:</p>

                <!-- BOTONES DE ROL -->
                <button type="button" class="role-btn" id="employeeBtn">Employees</button>
                <button type="button" class="role-btn" id="adminBtn">Administrator</button>

                <p>Password</p>
                <input type="password" name="password">

                <button type="submit" class="login-btn">Login</button>
            </form>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->

<script src="{% static 'config/js/login.js' %}"></script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
