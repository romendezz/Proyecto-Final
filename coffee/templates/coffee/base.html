{% load static %}
{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}Rojas Café - Sistema de Gestión{% endblock %}
    </title>

    <!-- BOOTSTRAP CSS + ICONS (usar CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS COMÚN -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}" />

    <!-- CSS ESPECÍFICO DE CADA PÁGINA -->
    {% block extra_css %}{% endblock %}
  </head>

  <body class="bg-light">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h4 class="mb-4">Rojas Café</h4>

      <a
        href="{% url 'dashboard' %}"
        class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
      >
        <i class="bi bi-speedometer2 me-2"></i>Inicio
      </a>
      <a
        href="{% url 'products' %}"
        class="{% if request.resolver_match.url_name == 'products' %}active{% endif %}"
      >
        <i class="bi bi-box-seam me-2"></i>Productos
      </a>
      <a
        href="{% url 'ventas' %}"
        class="{% if request.resolver_match.url_name == 'ventas' %}active{% endif %}"
      >
        <i class="bi bi-cart-check me-2"></i>Ventas
      </a>
      <a
        href="{% url 'reportes' %}"
        class="{% if request.resolver_match.url_name == 'reportes' %}active{% endif %}"
      >
        <i class="bi bi-graph-up me-2"></i>Reportes
      </a>
      <a
        href="{% url 'proveedores' %}"
        class="{% if request.resolver_match.url_name == 'proveedores' %}active{% endif %}"
      >
        <i class="bi bi-truck me-2"></i>Proveedores
      </a>

      <hr style="border-color: rgba(255, 255, 255, 0.2)" />

      <a href="#"><i class="bi bi-gear me-2"></i>Configuración</a>
      <a href="#"><i class="bi bi-box-arrow-left me-2"></i>Logout</a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">
      <button class="btn btn-outline-secondary hamburger-btn d-none mb-3" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      {% block content %} {% endblock %}
    </div>

    <!-- BOOTSTRAP JS (bundle incluye Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- CHART.JS (para dashboard) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- TOASTS -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
        <div id="toastSuccess" class="toast bg-success text-white" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastSuccessMsg"></div>
                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>

        <div id="toastError" class="toast bg-danger text-white" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastErrorMsg"></div>
                <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS PERSONALIZADOS -->
    <script>
      function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('show');
      }
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
